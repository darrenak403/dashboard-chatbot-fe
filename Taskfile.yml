version: "3"

vars:
  ENV: docker/.env

tasks:
  default:
    cmds:
      - task --list

  setup:
    desc: Cai bun + tao docker/.env
    cmds:
      - bun install
      - test -f {{.ENV}} || cp docker/.env.example {{.ENV}}

  dev:
    desc: Dev server http://localhost:3333
    dotenv:
      - "{{.ENV}}"
    preconditions:
      - sh: test -f {{.ENV}}
        msg: "Chay: task setup"
    cmds:
      - bun run dev
