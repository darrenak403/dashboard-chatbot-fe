# Production: static dashboard (serve)
#
# Image (CI): ${DOCKER_USERNAME}/fpt-admission-dashboard:latest
# Dokploy: compose file này + env trên UI

name: fpt-fe-prod

services:
  app:
    image: ${DOCKER_USERNAME}/fpt-admission-dashboard:${APP_TAG:-latest}
    pull_policy: always
    container_name: fpt-dashboard-prod
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3333/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - fpt-net-fe-prod

networks:
  fpt-net-fe-prod:
    name: fpt-net-fe-prod
    driver: bridge
