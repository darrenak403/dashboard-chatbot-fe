# Dev: chạy FE trên host — task dev (port 3333)
# Preview image Docker local: docker compose -f docker/docker-compose.dev.yml --profile app up -d

name: fpt-admission-dashboard-dev

services:
  app:
    profiles: ["app"]
    image: ${DOCKER_USERNAME}/fpt-admission-dashboard:${APP_TAG:-latest}
    pull_policy: always
    container_name: fpt-admission-dashboard-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    networks:
      - dev

networks:
  dev:
    driver: bridge
